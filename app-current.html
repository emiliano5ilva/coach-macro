// ─── SHARED COMPONENTS ────────────────────────────────────────────────────────
function Ring({value, max, color, size=140, sw=11}) {
  const r=(size-sw)/2, circ=2*Math.PI*r, pct=Math.min(Math.max(value/max,0),1);
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(245,245,240,0.08)" strokeWidth={sw}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw}
        strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round"
        style={{transition:"stroke-dashoffset 0.6s ease"}}/>
    </svg>
  );
}

function MacroRing({protein,carbs,fat,pTarget,cTarget,fTarget,size=200,sw=16}) {
  const total=pTarget+cTarget+fTarget;
  if(!total) return null;
  const circ=2*Math.PI*((size-sw)/2);
  const pArc=circ*(pTarget/total), cArc=circ*(cTarget/total);
  const pFill=circ*(Math.min(protein/pTarget,1)*(pTarget/total));
  const cFill=circ*(Math.min(carbs/cTarget,1)*(cTarget/total));
  const fFill=circ*(Math.min(fat/fTarget,1)*(fTarget/total));
  const r=(size-sw)/2;
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.s3} strokeWidth={sw}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.prot} strokeWidth={sw}
        strokeDasharray={`${pFill} ${circ-pFill}`} strokeDashoffset={0} strokeLinecap="round"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.carb} strokeWidth={sw}
        strokeDasharray={`${cFill} ${circ-cFill}`} strokeDashoffset={-(pArc)} strokeLinecap="round"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.fat} strokeWidth={sw}
        strokeDasharray={`${fFill} ${circ-cFill}`} strokeDashoffset={-(pArc+cArc)} strokeLinecap="round"/>
    </svg>
  );
}

function MacroBar({label, consumed, target, color}) {
  const pct=Math.min(consumed/target,1), rem=target-consumed;
  return (
    <div style={{background:T.s2,borderRadius:14,padding:"13px 15px",marginBottom:8,border:`1px solid ${T.bd}`}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
        <span style={{color,fontSize:10,fontWeight:500,letterSpacing:"0.14em",textTransform:"uppercase",fontFamily:"'DM Mono',monospace"}}>{label}</span>
        <span style={{fontFamily:"'DM Mono',monospace",fontSize:13,color:T.white}}>{consumed}g <span style={{color:T.mu}}>/ {target}g</span></span>
      </div>
      <div style={{height:4,background:"rgba(245,245,240,0.08)",borderRadius:2,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${pct*100}%`,background:color,borderRadius:2,transition:"width 0.5s"}}/>
      </div>
      <div style={{fontSize:10,color:T.mu,marginTop:4,fontFamily:"'DM Mono',monospace"}}>{rem>0?`${rem}g remaining`:"✓ Hit"}</div>
    </div>
  );
}

function Logo({size=32}) {
  const h=size, bw=h*0.28, gap=h*0.09, r=h*0.1, iw=bw*3+gap*2;
  const h1=h*0.42, h2=h*0.68, h3=h*1.00;

        <rect x={0} y={y1} width={bw} height={h1} rx={r} ry={r} fill="#e8341c" filter="url(#lg)"/>

          {/* Sidebar stats */}
          <div style={{padding:16,borderTop:`1px solid ${T.bd}`}}>
            <div style={{fontSize:10,color:T.dim,fontWeight:500,letterSpacing:"0.16em",textTransform:"uppercase",marginBottom:10,fontFamily:"'DM Mono',monospace"}}>Today</div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:12,color:T.mu}}>Calories</span>
              <span style={{fontSize:12,fontWeight:700,color:remaining.calories<0?T.red:"#fff"}}>{remaining.calories} left</span>
            </div>
            {[[T.prot,"P",consumed.protein,macros.protein],[T.carb,"C",consumed.carbs,macros.carbs],[T.fat,"F",consumed.fat,macros.fat]].map(([c,l,v,t])=>(
              <div key={l} style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                <span style={{fontSize:10,fontWeight:700,color:c,width:10}}>{l}</span>
                <div style={{flex:1,height:3,background:T.s3,borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${Math.min(v/t,1)*100}%`,background:c,borderRadius:2}}/>
                </div>
                <span style={{fontSize:10,color:T.mu,minWidth:28,textAlign:"right"}}>{t-v}g</span>
              </div>
            ))}
          </div>
        </aside>
      )}

      {/* Main content */}
      <main style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",minWidth:0}}>
        {/* Mobile top bar */}
        {isMobile && (
          <div style={{padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${T.bd}`,flexShrink:0,background:T.s1,position:"sticky",top:0,zIndex:40}}>
            <Logo size={24}/>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <div style={{background:"rgba(232,52,28,0.1)",border:"1px solid rgba(232,52,28,0.2)",borderRadius:20,padding:"4px 10px",color:T.prot,fontSize:9,fontWeight:500,letterSpacing:"0.12em",textTransform:"uppercase",fontFamily:"'DM Mono',monospace"}}>💪 {todayFocus.slice(0,8).toUpperCase()}</div>
              <div style={{background:`${T.prot}15`,borderRadius:20,padding:"4px 10px",fontSize:9,fontWeight:700,color:"#fff",fontFamily:"'DM Mono',monospace"}}>🔥 12d</div>
            </div>
          </div>
        )}

        {/* Desktop top bar */}
        {!isMobile && (
          <div style={{padding:"20px 32px 0",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
            <div>
              <div style={{fontSize:10,color:T.prot,fontWeight:500,letterSpacing:"0.16em",textTransform:"uppercase",fontFamily:"'DM Mono',monospace"}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:900,fontStyle:"italic",textTransform:"uppercase",color:T.white,marginTop:2}}>Hey, {MOCK_PROFILE.name}</div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <div style={{background:"rgba(232,52,28,0.1)",border:"1px solid rgba(232,52,28,0.25)",borderRadius:20,padding:"5px 14px",color:T.prot,fontSize:10,fontWeight:500,letterSpacing:"0.12em",textTransform:"uppercase",fontFamily:"'DM Mono',monospace"}}>💪 {todayType.toUpperCase()} DAY</div>
              <div style={{background:`${T.green}10`,border:`1px solid ${T.green}25`,borderRadius:20,padding:"5px 14px",color:T.green,fontSize:10,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>🔥 12 DAY STREAK</div>
            </div>
          </div>
        )}

        {/* Content area */}
        <div style={{flex:1,padding:isMobile?"12px 16px 12px":"20px 32px 24px",overflowY:isMobile?"auto":"visible"}}>
          {tab==="home"    && <HomeTab profile={MOCK_PROFILE} schedule={MOCK_SCHEDULE} wPrefs={wPrefs} macros={macros} consumed={consumed} remaining={remaining} log={log} todayKey={todayKey} todayType={todayType} todayFocus={todayFocus}/>}
          {tab==="fuel"    && <FuelTab macros={macros} consumed={consumed} remaining={remaining} log={log} setLog={setLog} wPrefs={wPrefs} setWPrefs={setWPrefs} todayKey={todayKey} todayType={todayType} todayFocus={todayFocus}/>}
          {tab==="train"   && <TrainTab profile={MOCK_PROFILE} schedule={MOCK_SCHEDULE} wPrefs={wPrefs} defaultScreen="today"/>}
          {tab==="progress"&& <TrainTab profile={MOCK_PROFILE} schedule={MOCK_SCHEDULE} wPrefs={wPrefs} defaultScreen="progress"/>}
          {tab==="settings"&& <SettingsTab profile={MOCK_PROFILE} schedule={MOCK_SCHEDULE} wPrefs={wPrefs} setWPrefs={setWPrefs}/>}
        </div>

        {/* Mobile bottom nav */}
        {isMobile && (
          <div style={{position:"sticky",bottom:0,background:"rgba(10,14,26,0.92)",backdropFilter:"blur(28px) saturate(180%)",WebkitBackdropFilter:"blur(28px) saturate(180%)",borderTop:"1px solid rgba(245,245,240,0.06)",display:"flex",zIndex:50,flexShrink:0,padding:"8px 8px 20px",paddingBottom:"max(20px,env(safe-area-inset-bottom))"}}>
            {NAV.map(item=>(
              <button key={item.id} onClick={()=>setTab(item.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"8px 4px",minHeight:52,display:"flex",flexDirection:"column",alignItems:"center",gap:3,position:"relative",color:tab===item.id?T.white:"rgba(245,245,240,0.4)",transition:"color 0.2s"}}>
                <div style={{position:"relative"}}>
                  {tab===item.id&&<div style={{position:"absolute",inset:"-8px -14px",background:"radial-gradient(circle,rgba(232,52,28,0.25),transparent 70%)",zIndex:-1,pointerEvents:"none"}}/>}
                  <div style={{fontSize:20}}>{item.icon}</div>
                </div>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:"0.1em",textTransform:"uppercase",color:tab===item.id?T.prot:"rgba(245,245,240,0.4)"}}>{item.label}</div>
              </button>
            ))}
          </div>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
