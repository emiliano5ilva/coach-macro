<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
  <!-- Background -->
  <rect width="52" height="52" rx="12" fill="#060D1A"/>
  
  <!-- Three ascending bars centered in 52x52 -->
  <!-- Bar widths: 11px each, gaps: 4px, total: 41px, offset: 5.5px left -->
  
  <!-- Bar 1 — Blue — 40% height = 21px, y = 52-6-21 = 25 -->
  <rect x="5" y="25" width="11" height="21" rx="3" fill="#2979FF"/>
  <rect x="5" y="25" width="11" height="5" rx="3" fill="rgba(255,255,255,0.2)"/>
  
  <!-- Bar 2 — Green — 65% height = 34px, y = 52-6-34 = 12 -->
  <rect x="20" y="12" width="11" height="34" rx="3" fill="#00E676"/>
  <rect x="20" y="12" width="11" height="5" rx="3" fill="rgba(255,255,255,0.18)"/>
  
  <!-- Bar 3 — Gold — 100% height = 40px, y = 52-6 = 6 -->
  <rect x="35" y="6" width="11" height="40" rx="3" fill="#FFD740"/>
  <rect x="35" y="6" width="11" height="5" rx="3" fill="rgba(255,255,255,0.15)"/>
  
  <!-- Baseline -->
  <rect x="5" y="46" width="41" height="2" rx="1" fill="rgba(255,255,255,0.1)"/>
</svg>