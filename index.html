<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <meta name="theme-color" content="#060D1A"/>
  <meta name="color-scheme" content="dark"/>
  <title>Coach Macro</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <style>*{margin:0;padding:0;box-sizing:border-box}html,body,#root{height:100%;background:#080808;color-scheme:dark}</style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
<!-- UserJot Feedback Widget -->
<script>
window.$ujq=window.$ujq||[];
window.uj=window.uj||new Proxy({},{
  get:(_,p)=>(...a)=>
    window.$ujq.push([p,...a])
});
document.head.appendChild(
  Object.assign(
    document.createElement('script'),
    {
      src:'https://cdn.userjot.com/sdk/v2/uj.js',
      type:'module',
      async:!0
    }
  )
);
window.uj.init(
  'cmpdox60502qt0iqwx692w8tw',
  {
    widget: true,
    theme: 'dark',
    trigger: 'custom',
  }
);
</script>
</body>
</html>
